events {}

http {
  server {
    listen 80;

    # Proxy to RabbitMQ management (with CORS for browser access)
    location /rabbitmq/ {
      # CORS headers for RabbitMQ UI
      add_header Access-Control-Allow-Origin "http://localhost:3000" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://rabbitmq:15672/;
      proxy_set_header Host $host;
    }

    # Proxy to Eureka (with CORS for browser access)
    location /eureka/ {
      # CORS headers for Eureka dashboard
      add_header Access-Control-Allow-Origin "http://localhost:3000" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      # Strip upstream CORS headers to prevent duplicates
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      proxy_pass http://eureka-server:8761;
      proxy_set_header Host $host;
    }

    # Proxy to Gateway API (no CORS here — gateway handles it via CorsConfig)
    location /api/v1/ {
      proxy_pass http://api-gateway:8080/api/v1/;
      proxy_set_header Host $host;
    }
  }
}