events {}

http {
  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name 141-148-43-8.sslip.io;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name 141-148-43-8.sslip.io;

    ssl_certificate /etc/letsencrypt/live/141-148-43-8.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/141-148-43-8.sslip.io/privkey.pem;

    # Proxy to RabbitMQ management
    location /rabbitmq/ {
      add_header Access-Control-Allow-Origin "https://meshgate-app.vercel.app" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Allow-Credentials "true" always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_pass http://rabbitmq:15672/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to Eureka
    location /eureka/ {
      add_header Access-Control-Allow-Origin "https://meshgate-app.vercel.app" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Allow-Credentials "true" always;

      if ($request_method = OPTIONS) {
        return 204;
      }

      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Methods;
      proxy_hide_header Access-Control-Allow-Headers;

      proxy_pass http://eureka-server:8761;
      proxy_set_header Host $host;
    }

    # Proxy to Gateway API
    location /api/v1/ {
      proxy_pass http://api-gateway:8080/api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}