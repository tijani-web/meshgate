services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: holdontohope
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro,Z
      - postgres-data:/var/lib/postgresql/data:Z
    networks:
      - meshgate-network

  rabbitmq:
    image: rabbitmq:3-management
    networks:
      - meshgate-network

  eureka-server:
    build: ./eureka-server
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - meshgate-network

  api-gateway:
    build: ./api-gateway
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - meshgate-network

  auth-service:
    build: ./auth-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eureka_auth_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    networks:
      - meshgate-network

  user-service:
    build: ./user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eureka_user_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    networks:
      - meshgate-network

  billing-service:
    build: ./billing-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eureka_billing_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    networks:
      - meshgate-network

  notification-service:
    build: ./notification-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/eureka_notification_db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    networks:
      - meshgate-network

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./certbot/conf:/etc/letsencrypt:Z
      - ./certbot/www:/var/www/certbot:Z
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    networks:
      - meshgate-network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt:Z
      - ./certbot/www:/var/www/certbot:Z
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - meshgate-network

networks:
  meshgate-network:
    driver: bridge

volumes:
  postgres-data:
